services:
  savia-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: savia-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=https://ollama.com/v1
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    volumes:
      # Hot-reload en développement : commenter en production
      - ./app:/savia/app
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - savia-network

networks:
  savia-network:
    driver: bridge
