services:
  savia-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: savia-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Hot-reload en développement : commenter en production
      - ./app:/savia/app
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - savia-network

networks:
  savia-network:
    driver: bridge
